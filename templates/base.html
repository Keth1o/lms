{% load static %}
<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<title>LMS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>

body {
    font-family: 'Roboto', sans-serif;
    background: #f1f3f4;
}

.sidebar {
    width: 260px;
    height: 100vh;
    position: fixed;
    background: white;
    border-right: 1px solid #ddd;
    padding: 20px;
}

.sidebar h4 {
    color: #5f6368;
}

.sidebar a {
    display: block;
    padding: 10px;
    border-radius: 8px;
    color: #3c4043;
    text-decoration: none;
    margin-bottom: 5px;
}

.sidebar a:hover {
    background: #e8f0fe;
}

.topbar {
    margin-left: 260px;
    height: 60px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid #ddd;
}

.content {
    margin-left: 260px;
    padding: 25px;
}

.card {
    border-radius: 12px;
    border: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.btn-primary {
    background: #1a73e8;
    border: none;
}

.btn-primary:hover {
    background: #1669c1;
}

.dark {
    background: #202124;
    color: white;
}

.dark .sidebar,
.dark .topbar {
    background: #303134;
    color: white;
}

.dark .card {
    background: #303134;
    color: white;
}

</style>

</head>

<body id="body">

<div class="sidebar">

<a href="{% url 'course_list' %}" class="text-decoration-none">
<h4 class="mb-4 text-dark">Журнал</h4>
</a>

<a href="{% url 'course_list' %}">Курси</a>

<a href="{% url 'schedule_page' %}">Розклад</a>

<a href="{% url 'deadlines_page' %}">Дедлайни</a>

{% if user.is_teacher %}
<a href="{% url 'add_course' %}">Створити курс</a>
<a href="{% url 'create_subject' %}">Створити предмет</a>
{% endif %}

</div>

<div class="topbar">

<h5 class="mb-0">LMS</h5>

<div class="d-flex gap-2">

<button onclick="toggleTheme()" class="btn btn-outline-secondary btn-sm">
Темний режим
</button>

<a href="{% url 'profile' %}" class="btn btn-primary btn-sm">
Профіль
</a>

</div>

</div>

<div class="content">

{% block content %}
{% endblock %}

</div>

<script>

function toggleTheme(){
    let body = document.getElementById("body");
    body.classList.toggle("dark");

    if(body.classList.contains("dark")){
        localStorage.setItem("theme","dark");
    } else {
        localStorage.setItem("theme","light");
    }
}

window.onload = function(){
    if(localStorage.getItem("theme")==="dark"){
        document.getElementById("body").classList.add("dark");
    }
}

</script>

</body>
</html>
