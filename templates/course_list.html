{% extends 'base.html' %}

{% block content %}

<h3 class="mb-4">Курси</h3>

<div class="row g-4">

{% for course in courses %}

<div class="col-md-4">

<div class="card p-3">

<h5>{{ course.title }}</h5>

<p class="text-muted">
{{ course.description|truncatewords:12 }}
</p>

<a href="{% url 'course_detail' course.id %}" class="btn btn-primary w-100">
Відкрити
</a>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
