{% extends 'base.html' %}

{% block content %}

<h3>Реєстрація учня</h3>

<p class="text-muted">Курс: <b>{{ course.title }}</b></p>

<div class="card p-4">

<form method="post">
{% csrf_token %}

<input type="text" name="username" placeholder="Логін" class="form-control mb-2">
<input type="password" name="password" placeholder="Пароль" class="form-control mb-2">

<button class="btn btn-primary w-100">
Зареєструвати
</button>

</form>

{% if error %}
<p class="text-danger mt-2">{{ error }}</p>
{% endif %}

</div>

{% endblock %}
