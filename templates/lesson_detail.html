{% extends 'base.html' %}

{% block content %}

<h3>{{ lesson.title }}</h3>

<div class="card p-4 mb-3">

{{ lesson.content|linebreaks }}

</div>

{% if lesson.video_url %}

<div class="card p-3">

<div class="ratio ratio-16x9">
<iframe src="{{ lesson.video_url }}" allowfullscreen></iframe>
</div>

</div>

{% endif %}

{% endblock %}
