{% load static %}
<!DOCTYPE html>
<html lang="uk">

    <title>Вхід</title>

          rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="container mt-5">

            </form>

        </div>
    </div>
</div>

</body>
</html>
