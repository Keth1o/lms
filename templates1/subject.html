<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">

<title>{{ subject.name }}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>{{ subject.name }}</h2>

<p>{{ subject.description }}</p>

<hr>

<h3>Завдання</h3>

{% if tasks %}

{% for t in tasks %}

<div class="card mb-2">
<div class="card-body">

<h5>{{ t.title }}</h5>

<p>{{ t.description }}</p>

<p><b>Дедлайн:</b> {{ t.deadline }}</p>

</div>
</div>

{% endfor %}

{% else %}

<p>Завдань поки немає.</p>

{% endif %}

<a href="{% url 'course_list' %}" class="btn btn-secondary mt-3">
Назад
</a>

</div>

</body>
</html>
