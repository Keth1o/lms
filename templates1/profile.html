<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">

<title>Мій профіль</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background-color: #f5f6fa;
}

.profile-card {
    background: white;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.avatar {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid #0d6efd;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="profile-card">

<h2 class="text-center mb-4">Мій профіль</h2>

<div class="row">

<!-- АВАТАР -->

<div class="col-md-4 text-center">

<img src="{{ user.avatar.url }}" class="avatar mb-3">

<h5>{{ user.username }}</h5>

<p class="text-muted">
{% if user.is_teacher %}
Викладач
{% else %}
Учень
{% endif %}
</p>

</div>

<!-- ФОРМА -->

<div class="col-md-8">

<form method="post" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Ім'я</label>
{{ form.first_name }}
</div>

<div class="mb-3">
<label class="form-label">Email</label>
{{ form.email }}
</div>

<div class="mb-3">
<label class="form-label">Аватар</label>
{{ form.avatar }}
</div>

<button class="btn btn-success w-100 mb-2">
Зберегти зміни
</button>

</form>

<hr>

<!-- КНОПКИ -->

<div class="d-grid gap-2">

<a href="{% url 'change_password' %}" class="btn btn-warning">
Змінити пароль
</a>

<a href="{% url 'course_list' %}" class="btn btn-secondary">
Назад до курсів
</a>

<a href="{% url 'logout' %}" class="btn btn-danger">
Вийти
</a>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
